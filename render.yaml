services:
  - type: web
    name: portfolio-be
    runtime: node
    rootDir: be
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: CORS_ORIGIN
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: CONTACT_TO
        sync: false
      - key: CONTACT_FROM
        value: "Portfolio Contact <no-reply@localhost>"

databases:
  - name: portfolio-db
    plan: free
    databaseName: portfolio
    user: portfolio
